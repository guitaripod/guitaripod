name: Daily Updates

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  release:
    types: [published] # Also trigger on new releases
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      # Update language distribution
      - name: Update language distribution
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_language_stats.py
      
      - name: Check for language changes
        id: check_lang_changes
        run: |
          if [[ -n $(git diff --name-only README.md) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
      
      # Update blog posts
      - name: Update blog posts
        run: python scripts/update_blog_posts.py
      
      - name: Check for blog changes
        id: check_blog_changes
        run: |
          if [ -f blog_changes_detected ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            rm blog_changes_detected
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
      
      # Update recent releases
      - name: Fetch Recent Releases
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');
            const startMark = '<!-- Recent Releases -->';
            const endMark = '<!-- End Recent Releases -->';
            const start = readme.indexOf(startMark);
            const end = readme.indexOf(endMark);
            if (start === -1 || end === -1) {
              core.setFailed('Release markers not found in README');
              return;
            }

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: context.repo.owner,
              per_page: 100,
              sort: 'updated',
            });

            const releases = [];
            for (const repo of repos.filter((r) => !r.fork)) {
              try {
                const { data } = await github.rest.repos.listReleases({
                  owner: context.repo.owner,
                  repo: repo.name,
                  per_page: 1,
                });
                if (data.length > 0) {
                  releases.push({
                    repo: repo.name,
                    version: data[0].name || data[0].tag_name,
                    url: data[0].html_url,
                    lang: repo.language || '—',
                    stars: repo.stargazers_count,
                    desc: repo.description || '',
                    published: data[0].published_at,
                  });
                }
              } catch (error) {
                console.log(`Skipping ${repo.name}: ${error.message}`);
              }
            }

            releases.sort((a, b) => new Date(b.published) - new Date(a.published));
            const shortLang = { JavaScript: 'JS', TypeScript: 'TS', Python: 'Py' };
            const esc = (s) => String(s).replace(/\|/g, '\\|');
            const rows = releases.slice(0, 20).map(
              (r) =>
                `| [${esc(r.repo)} ${esc(r.version)}](${r.url}) | ${shortLang[r.lang] || r.lang} | ${r.stars} | ${esc(r.desc)} |`
            );
            const newSection = [
              startMark,
              '| release | lang | ⭐ | what shipped |',
              '|---|---|---|---|',
              ...rows,
              endMark,
            ].join('\n');

            const current = readme.substring(start, end + endMark.length);
            if (current.trim() !== newSection.trim()) {
              readme = readme.substring(0, start) + newSection + readme.substring(end + endMark.length);
              fs.writeFileSync('README.md', readme);
              fs.writeFileSync('releases_changes_detected', 'true');
              console.log(`Releases section updated with ${rows.length} entries`);
            } else {
              console.log('No release changes');
            }

      - name: Check for releases changes
        id: check_releases_changes
        run: |
          if [ -f releases_changes_detected ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            rm releases_changes_detected
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
      
      # Commit changes if any
      - name: Commit and push if changed
        if: steps.check_lang_changes.outputs.changes == 'true' || steps.check_blog_changes.outputs.changes == 'true' || steps.check_releases_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          
          # Determine commit message based on what changed
          changes=()
          [[ "${{ steps.check_lang_changes.outputs.changes }}" == "true" ]] && changes+=("language distribution")
          [[ "${{ steps.check_blog_changes.outputs.changes }}" == "true" ]] && changes+=("blog posts")
          [[ "${{ steps.check_releases_changes.outputs.changes }}" == "true" ]] && changes+=("recent releases")
          
          # Join array elements with commas and 'and' for the last element
          message="Update "
          if [ ${#changes[@]} -eq 1 ]; then
            message+="${changes[0]}"
          elif [ ${#changes[@]} -eq 2 ]; then
            message+="${changes[0]} and ${changes[1]}"
          elif [ ${#changes[@]} -eq 3 ]; then
            message+="${changes[0]}, ${changes[1]} and ${changes[2]}"
          fi
          message+=" [skip ci]"
          
          git commit -m "$message"
          git push
