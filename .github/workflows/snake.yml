name: Snake

on:
  schedule:
    - cron: '45 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: guitaripod
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#33ff66&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/snake-light.svg?palette=github-light&color_snake=#005f00&color_dots=#eee8d5,#9be9a8,#40c463,#30a14e,#216e39

      - name: Crop the stack bar out of the snake
        run: |
          sed -i -E 's/viewBox="(-?[0-9]+) (-?[0-9]+) ([0-9]+) [0-9]+"/viewBox="\1 \2 \3 152"/; s/(<svg[^>]*height=")[0-9]+/\1152/' dist/*.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
