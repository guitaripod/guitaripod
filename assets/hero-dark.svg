<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-label="marcus@midgar terminal — Engineer who ships.">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
  <rect width="900" height="240" fill="#0d1117"/>
  <rect x="8" y="8" width="884" height="224" fill="#161b22" stroke="#2d333b" stroke-width="2"/>
  <rect x="8" y="8" width="884" height="36" fill="#1c2128" stroke="#2d333b" stroke-width="2"/>
  <circle cx="30" cy="26" r="6" fill="#ff7b72"/>
  <circle cx="52" cy="26" r="6" fill="#ffb000"/>
  <circle cx="74" cy="26" r="6" fill="#33ff66"/>
  <text x="450" y="31" text-anchor="middle" font-size="14" fill="#9198a1">marcus@midgar: ~</text>
  <text x="40" y="84" font-size="18"><tspan fill="#33ff66">$</tspan><tspan fill="#9198a1" dx="10">whoami</tspan></text>
  <text x="40" y="142" font-size="44" font-weight="bold"><tspan fill="#e6edf3">Engineer who </tspan><tspan fill="#33ff66" filter="url(#glow)">ships.</tspan></text>
  <rect x="560" y="108" width="20" height="40" fill="#33ff66" filter="url(#glow)">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <text x="40" y="186" font-size="17" fill="#9198a1">iOS · backend · AI · open source</text>
  <text x="860" y="186" text-anchor="end" font-size="17" fill="#ffb000">midgarcorp.cc</text>
</svg>
